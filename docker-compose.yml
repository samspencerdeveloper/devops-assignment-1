services:                                                                                         
    flask-app:                                                                                       
      build: .                                                                                       
      expose:                                                                                        
        - "5000"                                                                                     
                                                                                                     
    nginx:                                                                                           
      image: nginx:latest                                                                            
      ports:                                                                                         
        - "80:80"                                                                                    
      volumes:                                                                                       
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf                                                   
      depends_on:                                                                                    
        - flask-app